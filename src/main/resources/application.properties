spring.application.name=banca
server.port=8000

# DataSource (replace with your local DB creds via env vars or local profile)
spring.datasource.url=jdbc:postgresql://localhost:5432/banca
# Usa variables de entorno si existen; por defecto banca/banca (match con docker-compose)
spring.datasource.username=${DB_USER:banca}
spring.datasource.password=${DB_PASSWORD:banca}
spring.datasource.hikari.maximum-pool-size=10

# URLs por defecto:
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
# evita que cargue el "Petstore" por defecto
springdoc.swagger-ui.disable-swagger-default-url=true

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

# Flyway
spring.flyway.enabled=true

# Jackson
spring.jackson.time-zone=UTC
spring.jackson.serialization.WRITE_DATES_AS_TIMESTAMPS=false

